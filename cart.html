<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="header-container">
            <div class="logo">ShopCart</div>
            <nav>
                <ul>
                    <li><a href="catalog.html">Catalog</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="page-header">
            <h1>Shopping Cart</h1>
        </div>
        <div class="cart-container">
            <div class="cart-items">
                <div class="cart-item">
                    <div class="cart-item-image"><img src="https://img.icons8.com/?size=48&id=nK5KokYOqcnT&format=png" alt="Smartphone" /></div>
                    <div class="cart-item-details">
                        <h3 class="cart-item-name">Smartphone</h3>
                        <p class="cart-item-price">₹58,000</p>
                        <div class="cart-item-quantity">
                            <span>Quantity:</span>
                            <div class="quantity-controls">
                                <button class="quantity-btn">-</button>
                                <span class="quantity-value">1</span>
                                <button class="quantity-btn">+</button>
                            </div>
                        </div>
                    </div>
                    <button class="btn-remove">Remove</button>
                </div>
                <div class="cart-item">
                    <div class="cart-item-image"><img src="https://img.icons8.com/?size=48&id=Nu7yRHhhCwli&format=png" alt="Headphones" /></div>
                    <div class="cart-item-details">
                        <h3 class="cart-item-name">Headphones</h3>
                        <p class="cart-item-price">₹24,900</p>
                        <div class="cart-item-quantity">
                            <span>Quantity:</span>
                            <div class="quantity-controls">
                                <button class="quantity-btn">-</button>
                                <span class="quantity-value">2</span>
                                <button class="quantity-btn">+</button>
                            </div>
                        </div>
                    </div>
                    <button class="btn-remove">Remove</button>
                </div>
                <div class="cart-item">
                    <div class="cart-item-image"><img src="https://img.icons8.com/?size=48&id=22365&format=png" alt="Wireless Mouse" /></div>
                    <div class="cart-item-details">
                        <h3 class="cart-item-name">Wireless Mouse</h3>
                        <p class="cart-item-price">₹4,100</p>
                        <div class="cart-item-quantity">
                            <span>Quantity:</span>
                            <div class="quantity-controls">
                                <button class="quantity-btn">-</button>
                                <span class="quantity-value">1</span>
                                <button class="quantity-btn">+</button>
                            </div>
                        </div>
                    </div>
                    <button class="btn-remove">Remove</button>
                </div>
            </div>
            <div class="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>₹1,12,000</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>₹1,250</span>
                </div>
                <div class="summary-row">
                    <span>Tax:</span>
                    <span>₹9,000</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>₹1,22,250</span>
                </div>
                <button class="btn-checkout">Proceed to Checkout</button>
            </div>
        </div>
    </main>
</body>

</html>
